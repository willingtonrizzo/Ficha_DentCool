name: DentCool Windows Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: dentcool-project/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: dentcool-project
        run: npm ci

      - name: Build Windows installer artifact
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: dentcool-project
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: DentCool-[platform]-[arch]-[bundle]
          uploadUpdaterSignatures: true
